<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Madimi+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffeadd;
      --panel: #ffffff;
      --purple-dark: #831662;
      --orange-soft: #feb195;
      --accent-orange: #ff5010;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-tap-highlight-color: transparent;
    }

    body,
    a,
    button {
      font-family: "Madimi One", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-weight: 400;
      background: var(--bg);
      color: var(--purple-dark);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 28rem;
      margin-inline: auto;
      padding: max(1.2rem, env(safe-area-inset-top)) 1.2rem 1.5rem;
      position: relative;
    }

    h1 {
      margin: 1.05rem 0 0.9rem;
      font-size: clamp(2.1rem, 10.5vw, 3.05rem);
      line-height: 1.02;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--purple-dark);
      text-align: center;
    }

    .rule {
      height: 2px;
      background: var(--orange-soft);
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    .sticker-panel {
      background: var(--panel);
      border-radius: 1rem;
      padding: 1rem 0.85rem 1.05rem;
      box-shadow: 0 4px 18px rgba(131, 22, 98, 0.07);
    }

    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem 0.55rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sticker-grid-item {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.2rem;
      border-radius: 0.55rem;
      overflow: visible;
    }

    .sticker-link {
      position: relative;
      display: flex;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(131, 22, 98, 0.22);
      background: rgba(255, 249, 245, 0.92);
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, opacity 0.12s ease, border-color 0.12s ease;
      overflow: hidden;
    }

    .sticker-link:active {
      transform: scale(0.97);
      opacity: 0.94;
    }

    .sticker-link::after {
      content: attr(data-title);
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0.35rem;
      font-size: clamp(0.66rem, 2.8vw, 0.82rem);
      line-height: 1.1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--purple-dark);
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
      z-index: 2;
    }

    .sticker-grid img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(2px 4px 5px rgba(0, 0, 0, 0.16));
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 1;
    }

    .sticker-link:hover img,
    .sticker-link:focus-visible img {
      opacity: 0.5;
    }

    .sticker-link:hover::after,
    .sticker-link:focus-visible::after {
      opacity: 1;
    }

    .communities-next {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      margin: 1.45rem auto 0;
      color: var(--accent-orange);
      text-decoration: none;
      font-size: clamp(1.1rem, 4.9vw, 1.38rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
      width: fit-content;
    }

    .communities-next:active {
      opacity: 0.92;
    }

    .communities-next .arrow {
      font-size: 1.25em;
      line-height: 1;
    }
    footer {
      width: 100%;
      margin-top: auto;
      background: var(--purple-dark);
      padding: 1.55rem 1.35rem max(1.65rem, env(safe-area-inset-bottom));
      text-align: center;
      cursor: pointer;
    }

    .footer-brand {
      margin: 0;
      font-size: clamp(2rem, 10vw, 3rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-orange);
    }

</style>
  <script>
    (() => {
      const navEntry =
        typeof performance !== "undefined" && performance.getEntriesByType
          ? performance.getEntriesByType("navigation")[0]
          : null;
      const isReload = navEntry
        ? navEntry.type === "reload"
        : typeof performance !== "undefined" && performance.navigation
          ? performance.navigation.type === 1
          : false;

      if (isReload) {
        window.location.replace("index.html");
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>My community!</h1>
    <div class="rule" aria-hidden="true"></div>

    <section class="sticker-panel" aria-label="Community food stickers">
      <ul class="sticker-grid">
        <li>
          <div class="sticker-grid-item">
            <a class="sticker-link" href="community-topic.html?type=allergy&name=vegetarian" aria-label="Vegetarian community" data-title="Vegetarian">
              <img src="assets/splash/kiwi.png" width="216" height="162" alt="" />
            </a>
          </div>
        </li>
        <li>
          <div class="sticker-grid-item">
            <a class="sticker-link" href="community-topic.html?type=allergy&name=shellfish" aria-label="Shellfish community" data-title="Shellfish">
              <img src="assets/splash/shrimp.png" width="216" height="162" alt="" />
            </a>
          </div>
        </li>
        <li>
          <div class="sticker-grid-item">
            <a class="sticker-link" href="community-topic.html?type=allergy&name=gluten" aria-label="Gluten community" data-title="Gluten">
              <img src="assets/splash/bread.png" width="216" height="162" alt="" />
            </a>
          </div>
        </li>
        <li>
          <div class="sticker-grid-item">
            <a class="sticker-link" href="community-topic.html?type=allergy&name=kiwi" aria-label="Kiwi community" data-title="Kiwi">
              <img src="assets/splash/steak.png" width="216" height="162" alt="" />
            </a>
          </div>
        </li>
        <li>
          <div class="sticker-grid-item">
            <a class="sticker-link" href="community-topic.html?type=allergy&name=dairy" aria-label="Dairy community" data-title="Dairy">
              <img src="assets/splash/cheese.png" width="216" height="162" alt="" />
            </a>
          </div>
        </li>
        <li>
          <div class="sticker-grid-item">
            <a class="sticker-link" href="community-topic.html?type=allergy&name=egg" aria-label="Egg community" data-title="Egg">
              <img src="assets/splash/egg.png" width="216" height="162" alt="" />
            </a>
          </div>
        </li>
        <li>
          <div class="sticker-grid-item">
            <a class="sticker-link" href="community-topic.html?type=allergy&name=nuts" aria-label="Nuts community" data-title="Nuts">
              <img src="assets/splash/almond.png" width="216" height="162" alt="" />
            </a>
          </div>
        </li>
        <li>
          <div class="sticker-grid-item">
            <a class="sticker-link" href="community-topic.html?type=allergy&name=pineapple" aria-label="Pineapple community" data-title="Pineapple">
              <img src="assets/splash/pineapple.png" width="216" height="162" alt="" />
            </a>
          </div>
        </li>
        <li>
          <div class="sticker-grid-item">
            <a class="sticker-link" href="community-topic.html?type=allergy&name=berries" aria-label="Berries community" data-title="Berries">
              <img src="assets/splash/blackberry.png" width="216" height="162" alt="" />
            </a>
          </div>
        </li>
      </ul>
    </section>

    <a class="communities-next" href="my-communities-neighborhood.html" aria-label="Go to neighborhood my community page">
      <span>Allergies</span>
      <span class="arrow" aria-hidden="true">&gt;</span>
    </a>
  </main>

  <footer id="page-footer" role="button" tabindex="0" aria-label="Go back or go to home page">
    <p class="footer-brand">Bite Buddy</p>
  </footer>
  <script>
    const pageFooter = document.getElementById("page-footer");
    function goBackOrHome() {
      window.location.href = "home.html";
    }
    pageFooter?.addEventListener("click", goBackOrHome);
    pageFooter?.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        goBackOrHome();
      }
    });
  </script>
</body>
</html>
