<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Select your allergies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Madimi+One&display=swap" rel="stylesheet" />
  <style>
    /* Colors sampled from the reference screenshot (pixel mode ~exact). */
    :root {
      --bg: #ffeadd;
      --purple-dark: #831662;
      --purple-light: #d19cb0;
      --orange: #feb195;
      /* NEXT button — sampled from the NEXT asset screenshot */
      --next-orange: #ff5010;
      --next-text: #ffeadd;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-tap-highlight-color: transparent;
    }

    body,
    button,
    input,
    textarea,
    select {
      font-family: "Madimi One", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-weight: 400;
      background: var(--bg);
      color: var(--purple-dark);
    }

    .page-content {
      flex: 1;
      width: 100%;
      max-width: 28rem;
      margin-inline: auto;
      padding: max(1.25rem, env(safe-area-inset-top)) 1.25rem 1.25rem;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(1.35rem, 5.5vw, 1.65rem);
      line-height: 1.15;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .rule {
      height: 2px;
      background: var(--orange);
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    ul {
      list-style: disc;
      margin: 0 0 1.5rem;
      padding-left: 1.35rem;
    }

    li {
      margin-bottom: 0.55rem;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      user-select: none;
      color: var(--purple-light);
      transition: color 0.15s ease;
    }

    li::marker {
      color: currentColor;
    }

    li.selected {
      color: var(--purple-dark);
    }

    .other-wrap {
      background: var(--orange);
      border-radius: 1rem;
      padding: 0.85rem 1rem 0.95rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .other-label {
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--purple-dark);
    }

    .other-input {
      width: 100%;
      border: none;
      background: transparent;
      border-radius: 0.65rem;
      padding: 0.65rem 0.75rem;
      font: inherit;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--purple-dark);
      outline: none;
    }

    .other-input::placeholder {
      color: var(--purple-light);
    }

    .btn-next {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50%;
      max-width: 100%;
      margin-top: 1.1rem;
      margin-inline: auto;
      padding: 0.95rem 1.25rem;
      border: none;
      border-radius: 1rem;
      background: var(--next-orange);
      color: var(--next-text);
      font: inherit;
      font-size: clamp(1.1rem, 4.2vw, 1.35rem);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-next:active {
      opacity: 0.94;
    }

    .page-footer {
      width: 100%;
      margin-top: auto;
      overflow: hidden;
    }

    .page-footer img {
      display: block;
      width: 100%;
      height: auto;
      transform: translateY(50%);
    }

    .page-footer-link {
      display: block;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

  </style>
  <script>
    (() => {
      const navEntry =
        typeof performance !== "undefined" && performance.getEntriesByType
          ? performance.getEntriesByType("navigation")[0]
          : null;
      const isReload = navEntry
        ? navEntry.type === "reload"
        : typeof performance !== "undefined" && performance.navigation
          ? performance.navigation.type === 1
          : false;

      if (isReload) {
        window.location.replace("index.html");
      }
    })();
  </script>
</head>
<body>
  <main class="page-content">
    <h1>Select your allergies:</h1>
    <div class="rule" aria-hidden="true"></div>

    <ul id="allergy-list"></ul>

    <div class="other-wrap">
      <span class="other-label" id="other-label">Other:</span>
      <input
        type="text"
        id="other-input"
        class="other-input"
        autocomplete="off"
        autocapitalize="characters"
        enterkeyhint="done"
        placeholder="TYPE ALLERGY, PRESS ENTER"
        aria-labelledby="other-label"
      />
    </div>

    <a class="btn-next" href="next.html" id="btn-next">Next</a>
  </main>

  <footer class="page-footer" aria-label="Food collage footer">
    <a class="page-footer-link" href="home.html" aria-label="Go to home screen">
      <img
        src="images/allergy-footer-collage.png"
        alt="Colorful illustrated food collage"
      />
    </a>
  </footer>

  <script>
    const DEFAULT_ITEMS = [
      "Gluten",
      "Dairy",
      "Peanuts",
      "Treenuts",
      "Eggs",
      "Soy",
      "Vegetarian",
      "Shellfish",
    ];

    const listEl = document.getElementById("allergy-list");
    const inputEl = document.getElementById("other-input");
    const nextBtn = document.getElementById("btn-next");

    nextBtn.addEventListener("click", () => {
      const selected = items
        .filter((i) => i.selected)
        .map((i) => i.label.trim())
        .filter(Boolean);
      sessionStorage.setItem("selectedAllergies", JSON.stringify(selected));
    });

    /** @type {{ id: string; label: string; selected: boolean }[]} */
    let items = DEFAULT_ITEMS.map((label, i) => ({
      id: `d-${i}`,
      label,
      selected: false,
    }));

    function render() {
      listEl.innerHTML = "";
      for (const item of items) {
        const li = document.createElement("li");
        li.textContent = item.label;
        li.dataset.id = item.id;
        if (item.selected) li.classList.add("selected");
        li.addEventListener("click", () => {
          item.selected = !item.selected;
          li.classList.toggle("selected", item.selected);
        });
        listEl.appendChild(li);
      }
    }

    function addCustom(raw) {
      const label = raw.trim();
      if (!label) return;
      const id = `c-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      items.push({ id, label, selected: true });
      render();
    }

    inputEl.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      addCustom(inputEl.value);
      inputEl.value = "";
    });

    render();
  </script>
</body>
</html>
