<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Join a Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Madimi+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffeadd;
      --card: #fff9f5;
      --purple-dark: #831662;
      --orange-soft: #feb195;
      --accent-orange: #ff5010;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-tap-highlight-color: transparent;
    }

    body,
    button,
    input,
    textarea,
    select {
      font-family: "Madimi One", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-weight: 400;
      background: var(--bg);
      color: var(--purple-dark);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 28rem;
      margin-inline: auto;
      padding: max(1.2rem, env(safe-area-inset-top)) 1.2rem 1.5rem;
      position: relative;
    }

    h1 {
      margin: 1.6rem 0 1rem;
      text-align: center;
      font-size: clamp(2.1rem, 10.5vw, 3.05rem);
      line-height: 1.02;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--purple-dark);
    }

    .rule {
      height: 2px;
      background: var(--orange-soft);
      border-radius: 999px;
      margin-bottom: 1.1rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: clamp(1.02rem, 4.6vw, 1.35rem);
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent-orange);
    }

    .search-input {
      width: 100%;
      border: none;
      border-radius: 0.7rem;
      background: var(--card);
      padding: 0.92rem 1rem;
      font: inherit;
      font-size: clamp(1.25rem, 5.2vw, 1.52rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--purple-dark);
      outline: none;
    }

    .search-input::placeholder {
      color: var(--orange-soft);
      opacity: 1;
    }

    .submit-wrap {
      margin-top: 0.45rem;
      display: flex;
      justify-content: center;
    }

    .btn-search {
      width: 50%;
      max-width: 100%;
      border: none;
      border-radius: 0.7rem;
      background: var(--accent-orange);
      color: #fff;
      font: inherit;
      font-size: clamp(1.15rem, 4.9vw, 1.45rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-search:active {
      opacity: 0.92;
    }
    footer {
      width: 100%;
      margin-top: auto;
      background: var(--purple-dark);
      padding: 1.55rem 1.35rem max(1.65rem, env(safe-area-inset-bottom));
      text-align: center;
      cursor: pointer;
    }

    .footer-brand {
      margin: 0;
      font-size: clamp(2rem, 10vw, 3rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-orange);
    }

</style>
  <script>
    (() => {
      const navEntry =
        typeof performance !== "undefined" && performance.getEntriesByType
          ? performance.getEntriesByType("navigation")[0]
          : null;
      const isReload = navEntry
        ? navEntry.type === "reload"
        : typeof performance !== "undefined" && performance.navigation
          ? performance.navigation.type === 1
          : false;

      if (isReload) {
        window.location.replace("index.html");
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>Join a community!</h1>
    <div class="rule" aria-hidden="true"></div>

    <div class="field">
      <label class="field-label" for="allergy-search">Search by allergy:</label>
      <input id="allergy-search" class="search-input" type="text" placeholder="Search" />
    </div>

    <div class="field">
      <label class="field-label" for="neighborhood-search">Search by neighborhood:</label>
      <input id="neighborhood-search" class="search-input" type="text" placeholder="Search" />
    </div>

    <div class="field">
      <label class="field-label" for="cuisine-search">Search by cuisine:</label>
      <input id="cuisine-search" class="search-input" type="text" placeholder="Search" />
    </div>

    <div class="submit-wrap">
      <button type="button" class="btn-search">Search</button>
    </div>
  </main>

  <footer id="page-footer" role="button" tabindex="0" aria-label="Go back or go to home page">
    <p class="footer-brand">Bite Buddy</p>
  </footer>
  <script>
    const pageFooter = document.getElementById("page-footer");
    function goBackOrHome() {
      window.location.href = "home.html";
    }
    pageFooter?.addEventListener("click", goBackOrHome);
    pageFooter?.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        goBackOrHome();
      }
    });
  </script>
</body>
</html>
