<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Join a Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Madimi+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffeadd;
      --card: #fff9f5;
      --purple-dark: #831662;
      --purple-light: #d19cb0;
      --orange-soft: #feb195;
      --accent-orange: #ff5010;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-tap-highlight-color: transparent;
    }

    body,
    button,
    input,
    textarea,
    select {
      font-family: "Madimi One", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-weight: 400;
      background: var(--bg);
      color: var(--purple-dark);
      text-transform: uppercase;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 28rem;
      margin-inline: auto;
      padding: max(1.2rem, env(safe-area-inset-top)) 1.2rem 1.5rem;
      position: relative;
    }

    h1 {
      margin: 1.6rem 0 1rem;
      text-align: center;
      font-size: clamp(2.1rem, 10.5vw, 3.05rem);
      line-height: 1.02;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--purple-dark);
    }

    .rule {
      height: 2px;
      background: var(--orange-soft);
      border-radius: 999px;
      margin-bottom: 1.1rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: clamp(1.02rem, 4.6vw, 1.35rem);
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent-orange);
    }

    .community-pick-list {
      list-style: disc;
      margin: 0 0 0.1rem;
      padding-left: 1.35rem;
    }

    .community-pick-list li {
      margin-bottom: 0.55rem;
      font-size: clamp(1.02rem, 4.1vw, 1.1rem);
      letter-spacing: 0.04em;
      cursor: pointer;
      user-select: none;
      color: var(--purple-light);
      transition: color 0.15s ease;
    }

    .community-pick-list li::marker {
      color: currentColor;
    }

    .community-pick-list li.selected {
      color: var(--purple-dark);
    }

    .save-status {
      min-height: 1rem;
      margin-top: 0.5rem;
      text-align: center;
      font-size: clamp(0.8rem, 2.8vw, 0.9rem);
      letter-spacing: 0.04em;
      color: var(--accent-orange);
    }

    .submit-wrap {
      margin-top: 0.45rem;
      display: flex;
      justify-content: center;
    }

    .btn-search {
      width: 50%;
      max-width: 100%;
      border: none;
      border-radius: 0.7rem;
      background: var(--accent-orange);
      color: #fff;
      font: inherit;
      font-size: clamp(1.15rem, 4.9vw, 1.45rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-search:active {
      opacity: 0.92;
    }
    footer {
      width: 100%;
      margin-top: auto;
      background: var(--purple-dark);
      padding: 1.55rem 1.35rem max(1.65rem, env(safe-area-inset-bottom));
      text-align: center;
      cursor: pointer;
    }

    .footer-brand {
      margin: 0;
      font-size: clamp(2rem, 10vw, 3rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-orange);
    }

</style>
  <script>
    (() => {
      const navEntry =
        typeof performance !== "undefined" && performance.getEntriesByType
          ? performance.getEntriesByType("navigation")[0]
          : null;
      const isReload = navEntry
        ? navEntry.type === "reload"
        : typeof performance !== "undefined" && performance.navigation
          ? performance.navigation.type === 1
          : false;

      if (isReload) {
        window.location.replace("index.html");
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>Join a community!</h1>
    <div class="rule" aria-hidden="true"></div>

    <div class="field">
      <p class="field-label" id="label-join-allergies">Search by allergy:</p>
      <ul class="community-pick-list" id="join-allergies" aria-labelledby="label-join-allergies"></ul>
    </div>

    <div class="field">
      <p class="field-label" id="label-join-neighborhoods">Search by neighborhood:</p>
      <ul class="community-pick-list" id="join-neighborhoods" aria-labelledby="label-join-neighborhoods"></ul>
    </div>

    <div class="field">
      <p class="field-label" id="label-join-cuisines">Search by cuisine:</p>
      <ul class="community-pick-list" id="join-cuisines" aria-labelledby="label-join-cuisines"></ul>
    </div>

    <p class="save-status" id="join-save-status" role="status" aria-live="polite"></p>

    <div class="submit-wrap">
      <button type="button" class="btn-search" id="join-save-btn">Join</button>
    </div>
  </main>

  <footer id="page-footer" role="button" tabindex="0" aria-label="Go back or go to home page">
    <p class="footer-brand">Bite Buddy</p>
  </footer>
  <script src="js/communities-store.js"></script>
  <script>
    const pageFooter = document.getElementById("page-footer");
    function goBackOrHome() {
      window.location.href = "home.html";
    }
    pageFooter?.addEventListener("click", goBackOrHome);
    pageFooter?.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        goBackOrHome();
      }
    });

    (function initJoin() {
      const { ALLERGY, NEIGHBORHOOD, CUISINE, loadPicks, savePicks } = window.BiteBuddyCommunities;
      const elAllergies = document.getElementById("join-allergies");
      const elNeighborhoods = document.getElementById("join-neighborhoods");
      const elCuisines = document.getElementById("join-cuisines");
      const statusEl = document.getElementById("join-save-status");
      const saveBtn = document.getElementById("join-save-btn");

      function optionLabel(o) {
        return o.label != null ? o.label : o.dataTitle;
      }

      function renderPickList(ul, options, selectedIds) {
        const set = new Set(selectedIds);
        ul.innerHTML = "";
        options.forEach((o) => {
          const li = document.createElement("li");
          li.textContent = optionLabel(o);
          li.dataset.id = o.id;
          if (set.has(o.id)) li.classList.add("selected");
          li.addEventListener("click", () => {
            li.classList.toggle("selected");
          });
          ul.appendChild(li);
        });
      }

      function selectedFromList(ul) {
        return Array.from(ul.querySelectorAll("li.selected"), (li) => li.dataset.id);
      }

      const picks = loadPicks();
      renderPickList(elAllergies, ALLERGY, picks.allergies);
      renderPickList(elNeighborhoods, NEIGHBORHOOD, picks.neighborhoods);
      renderPickList(elCuisines, CUISINE, picks.cuisines);

      saveBtn.addEventListener("click", () => {
        const next = {
          allergies: selectedFromList(elAllergies),
          neighborhoods: selectedFromList(elNeighborhoods),
          cuisines: selectedFromList(elCuisines),
        };
        savePicks(next);
        const total = next.allergies.length + next.neighborhoods.length + next.cuisines.length;
        statusEl.textContent = total
          ? "SAVED! YOUR MY COMMUNITIES PAGES WILL SHOW " +
            total +
            " STICKER" +
            (total === 1 ? "" : "S") +
            "."
          : "SAVED! CLEAR SELECTIONS STAY EMPTY ON MY COMMUNITIES UNTIL YOU CHOOSE AT LEAST ONE.";
        window.setTimeout(() => {
          statusEl.textContent = "";
        }, 4500);
      });
    })();
  </script>
</body>
</html>
