<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Join a Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Madimi+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffeadd;
      --card: #fff9f5;
      --purple-dark: #831662;
      --orange-soft: #feb195;
      --accent-orange: #ff5010;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-tap-highlight-color: transparent;
    }

    body,
    button,
    input,
    textarea,
    select {
      font-family: "Madimi One", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-weight: 400;
      background: var(--bg);
      color: var(--purple-dark);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 28rem;
      margin-inline: auto;
      padding: max(1.2rem, env(safe-area-inset-top)) 1.2rem 1.5rem;
      position: relative;
    }

    h1 {
      margin: 1.6rem 0 1rem;
      text-align: center;
      font-size: clamp(2.1rem, 10.5vw, 3.05rem);
      line-height: 1.02;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--purple-dark);
    }

    .rule {
      height: 2px;
      background: var(--orange-soft);
      border-radius: 999px;
      margin-bottom: 1.1rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: clamp(1.02rem, 4.6vw, 1.35rem);
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent-orange);
    }

    .field-hint {
      margin: 0.3rem 0 0.45rem;
      font-size: clamp(0.8rem, 3.2vw, 0.92rem);
      line-height: 1.3;
      color: var(--purple-dark);
      opacity: 0.75;
    }

    .join-select {
      width: 100%;
      min-height: 7.5rem;
      border: none;
      border-radius: 0.7rem;
      background: var(--card);
      padding: 0.5rem 0.65rem;
      font: inherit;
      font-size: clamp(0.95rem, 3.7vw, 1.1rem);
      line-height: 1.25;
      color: var(--purple-dark);
      outline: none;
    }

    .join-select option {
      padding: 0.25rem 0.15rem;
    }

    .save-status {
      min-height: 1.2rem;
      margin-top: 0.75rem;
      text-align: center;
      font-size: clamp(0.88rem, 3.5vw, 1rem);
      color: var(--accent-orange);
    }

    .submit-wrap {
      margin-top: 0.65rem;
      display: flex;
      justify-content: center;
    }

    .btn-save-communities {
      width: 70%;
      max-width: 100%;
      border: none;
      border-radius: 0.7rem;
      background: var(--accent-orange);
      color: #fff;
      font: inherit;
      font-size: clamp(1.15rem, 4.9vw, 1.45rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-save-communities:active {
      opacity: 0.92;
    }
    footer {
      width: 100%;
      margin-top: auto;
      background: var(--purple-dark);
      padding: 1.55rem 1.35rem max(1.65rem, env(safe-area-inset-bottom));
      text-align: center;
      cursor: pointer;
    }

    .footer-brand {
      margin: 0;
      font-size: clamp(2rem, 10vw, 3rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-orange);
    }

</style>
  <script>
    (() => {
      const navEntry =
        typeof performance !== "undefined" && performance.getEntriesByType
          ? performance.getEntriesByType("navigation")[0]
          : null;
      const isReload = navEntry
        ? navEntry.type === "reload"
        : typeof performance !== "undefined" && performance.navigation
          ? performance.navigation.type === 1
          : false;

      if (isReload) {
        window.location.replace("index.html");
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>Join a community!</h1>
    <div class="rule" aria-hidden="true"></div>

    <div class="field">
      <label class="field-label" for="join-allergies">Allergy communities</label>
      <p class="field-hint" id="hint-allergies">Choose one or more. On desktop: hold Ctrl / ⌘ and click. On many phones: tap each line to add.</p>
      <select id="join-allergies" class="join-select" multiple size="5" aria-describedby="hint-allergies"></select>
    </div>

    <div class="field">
      <label class="field-label" for="join-neighborhoods">Neighborhood communities</label>
      <p class="field-hint" id="hint-neighborhoods">Choose one or more. Use Ctrl / ⌘ + click to select multiple on desktop.</p>
      <select id="join-neighborhoods" class="join-select" multiple size="5" aria-describedby="hint-neighborhoods"></select>
    </div>

    <div class="field">
      <label class="field-label" for="join-cuisines">Cuisine communities</label>
      <p class="field-hint" id="hint-cuisines">Choose one or more. Use Ctrl / ⌘ + click to select multiple on desktop.</p>
      <select id="join-cuisines" class="join-select" multiple size="5" aria-describedby="hint-cuisines"></select>
    </div>

    <p class="save-status" id="join-save-status" role="status" aria-live="polite"></p>

    <div class="submit-wrap">
      <button type="button" class="btn-save-communities" id="join-save-btn">Save my communities</button>
    </div>
  </main>

  <footer id="page-footer" role="button" tabindex="0" aria-label="Go back or go to home page">
    <p class="footer-brand">Bite Buddy</p>
  </footer>
  <script src="js/communities-store.js"></script>
  <script>
    const pageFooter = document.getElementById("page-footer");
    function goBackOrHome() {
      window.location.href = "home.html";
    }
    pageFooter?.addEventListener("click", goBackOrHome);
    pageFooter?.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        goBackOrHome();
      }
    });

    (function initJoin() {
      const { ALLERGY, NEIGHBORHOOD, CUISINE, loadPicks, savePicks } = window.BiteBuddyCommunities;
      const elAllergies = document.getElementById("join-allergies");
      const elNeighborhoods = document.getElementById("join-neighborhoods");
      const elCuisines = document.getElementById("join-cuisines");
      const statusEl = document.getElementById("join-save-status");
      const saveBtn = document.getElementById("join-save-btn");

      function fillSelect(select, options) {
        select.innerHTML = "";
        options.forEach((o) => {
          const opt = document.createElement("option");
          opt.value = o.id;
          opt.textContent = o.label != null ? o.label : o.dataTitle;
          select.appendChild(opt);
        });
      }

      function applySelections(select, selectedIds) {
        const set = new Set(selectedIds);
        Array.from(select.options).forEach((opt) => {
          opt.selected = set.has(opt.value);
        });
      }

      const picks = loadPicks();
      fillSelect(elAllergies, ALLERGY);
      fillSelect(elNeighborhoods, NEIGHBORHOOD);
      fillSelect(elCuisines, CUISINE);

      applySelections(elAllergies, picks.allergies);
      applySelections(elNeighborhoods, picks.neighborhoods);
      applySelections(elCuisines, picks.cuisines);

      function selectedValues(select) {
        return Array.from(select.selectedOptions).map((o) => o.value);
      }

      saveBtn.addEventListener("click", () => {
        const next = {
          allergies: selectedValues(elAllergies),
          neighborhoods: selectedValues(elNeighborhoods),
          cuisines: selectedValues(elCuisines),
        };
        savePicks(next);
        const total = next.allergies.length + next.neighborhoods.length + next.cuisines.length;
        statusEl.textContent = total
          ? "Saved! Your My communities pages will show " + total + " sticker" + (total === 1 ? "" : "s") + "."
          : "Saved! Clear selections stay empty on My communities until you choose at least one.";
        window.setTimeout(() => {
          statusEl.textContent = "";
        }, 4500);
      });
    })();
  </script>
</body>
</html>
