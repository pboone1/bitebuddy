<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Community — Cuisine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Madimi+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffeadd;
      --panel: #ffffff;
      --purple-dark: #831662;
      --orange-soft: #feb195;
      --accent-orange: #ff5010;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-tap-highlight-color: transparent;
    }

    body,
    a {
      font-family: "Madimi One", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-weight: 400;
      background: var(--bg);
      color: var(--purple-dark);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 28rem;
      margin-inline: auto;
      padding: max(1.2rem, env(safe-area-inset-top)) 1.2rem 1.5rem;
    }

    h1 {
      margin: 0.85rem 0 0.9rem;
      font-size: clamp(2.1rem, 10.5vw, 3.05rem);
      line-height: 1.02;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--purple-dark);
      text-align: center;
    }

    .rule {
      height: 2px;
      background: var(--orange-soft);
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    .sticker-panel {
      background: var(--panel);
      border-radius: 1rem;
      padding: 1rem 0.85rem 1.05rem;
      box-shadow: 0 4px 18px rgba(131, 22, 98, 0.07);
    }

    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem 0.55rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sticker-grid-item {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.2rem;
      border-radius: 0.55rem;
      overflow: hidden;
    }

    .sticker-btn {
      display: flex;
      width: 100%;
      height: 100%;
      border-radius: 0.55rem;
      border: none;
      padding: 0;
      margin: 0;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, opacity 0.12s ease;
      cursor: pointer;
    }

    .sticker-btn:active {
      transform: scale(0.97);
      opacity: 0.94;
    }

    .sticker-grid img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(2px 4px 5px rgba(0, 0, 0, 0.16));
      pointer-events: none;
    }

    .communities-prev {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      margin: 1.45rem auto 0;
      color: var(--accent-orange);
      text-decoration: none;
      font-size: clamp(1.1rem, 4.9vw, 1.38rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
    }

    .communities-prev:active {
      opacity: 0.92;
    }

    .communities-prev .arrow {
      font-size: 1.25em;
      line-height: 1;
    }
    footer {
      width: 100%;
      margin-top: auto;
      background: var(--purple-dark);
      padding: 1.55rem 1.35rem max(1.65rem, env(safe-area-inset-bottom));
      text-align: center;
      cursor: pointer;
    }

    .footer-brand {
      margin: 0;
      font-size: clamp(2rem, 10vw, 3rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-orange);
    }

</style>
  <script>
    (() => {
      const navEntry =
        typeof performance !== "undefined" && performance.getEntriesByType
          ? performance.getEntriesByType("navigation")[0]
          : null;
      const isReload = navEntry
        ? navEntry.type === "reload"
        : typeof performance !== "undefined" && performance.navigation
          ? performance.navigation.type === 1
          : false;

      if (isReload) {
        window.location.replace("index.html");
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>My community!</h1>
    <div class="rule" aria-hidden="true"></div>

    <section class="sticker-panel" aria-label="Cuisine stickers">
      <ul class="sticker-grid">
        <li><div class="sticker-grid-item"><button type="button" class="sticker-btn" data-route="community-cuisine-japanese.html" aria-label="Japanese community"><img src="assets/communities/cuisine/japanese.png" width="216" height="162" alt="" /></button></div></li>
        <li><div class="sticker-grid-item"><button type="button" class="sticker-btn" data-route="community-cuisine-chinese.html" aria-label="Chinese community"><img src="assets/communities/cuisine/chinese.png" width="216" height="162" alt="" /></button></div></li>
        <li><div class="sticker-grid-item"><button type="button" class="sticker-btn" data-route="community-cuisine-american.html" aria-label="American community"><img src="assets/communities/cuisine/american.png" width="216" height="162" alt="" /></button></div></li>
        <li><div class="sticker-grid-item"><button type="button" class="sticker-btn" data-route="community-cuisine-italian.html" aria-label="Italian community"><img src="assets/communities/cuisine/italian.png" width="216" height="162" alt="" /></button></div></li>
        <li><div class="sticker-grid-item"><button type="button" class="sticker-btn" data-route="community-cuisine-mexican.html" aria-label="Mexican community"><img src="assets/communities/cuisine/mexican.png" width="216" height="162" alt="" /></button></div></li>
        <li><div class="sticker-grid-item"><button type="button" class="sticker-btn" data-route="community-cuisine-mediterranean.html" aria-label="Mediterranean community"><img src="assets/communities/cuisine/mediterranean.png" width="216" height="162" alt="" /></button></div></li>
        <li><div class="sticker-grid-item"><button type="button" class="sticker-btn" data-route="community-cuisine-breakfast.html" aria-label="Breakfast community"><img src="assets/communities/cuisine/breakfast.png" width="216" height="162" alt="" /></button></div></li>
        <li><div class="sticker-grid-item"><button type="button" class="sticker-btn" data-route="community-cuisine-french.html" aria-label="French community"><img src="assets/communities/cuisine/french.png" width="216" height="162" alt="" /></button></div></li>
        <li><div class="sticker-grid-item"><button type="button" class="sticker-btn" data-route="community-cuisine-indian.html" aria-label="Indian community"><img src="assets/communities/cuisine/indian.png" width="216" height="162" alt="" /></button></div></li>
      </ul>
    </section>

    <a class="communities-prev" href="my-communities.html" aria-label="Go back to allergies my community page">
      <span class="arrow" aria-hidden="true">&lt;</span>
      <span>Cuisine</span>
    </a>
  </main>

  <footer id="page-footer" role="button" tabindex="0" aria-label="Go back or go to home page">
    <p class="footer-brand">Bite Buddy</p>
  </footer>
  <script>
    const pageFooter = document.getElementById("page-footer");
    function goBackOrHome() {
      window.location.href = "home.html";
    }
    pageFooter?.addEventListener("click", goBackOrHome);
    pageFooter?.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        goBackOrHome();
      }
    });

    document.querySelectorAll(".sticker-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const route = btn.getAttribute("data-route");
        if (route) window.location.href = route;
      });
    });
  </script>
</body>
</html>
