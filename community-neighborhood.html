<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Neighborhood Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Madimi+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffeadd;
      --panel: #ffffff;
      --purple-dark: #831662;
      --orange-soft: #feb195;
      --accent-orange: #ff5010;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-tap-highlight-color: transparent;
    }

    body,
    a {
      font-family: "Madimi One", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--purple-dark);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 28rem;
      margin-inline: auto;
      padding: max(1.2rem, env(safe-area-inset-top)) 1.2rem 1.45rem;
    }

    h1 {
      margin: 0.8rem 0 0.85rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: clamp(2rem, 10vw, 3rem);
      line-height: 1.03;
      color: var(--purple-dark);
    }

    .rule {
      height: 2px;
      border-radius: 999px;
      background: var(--orange-soft);
      margin-bottom: 1.2rem;
    }

    .blog-panel {
      background: var(--panel);
      border-radius: 1rem;
      padding: 1rem 0.9rem;
      box-shadow: 0 4px 18px rgba(131, 22, 98, 0.07);
    }

    .blog-tag {
      margin: 0;
      color: var(--accent-orange);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.76rem;
    }

    .blog-title {
      margin: 0.28rem 0 0.65rem;
      color: var(--purple-dark);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: clamp(1.25rem, 6vw, 1.7rem);
      line-height: 1.08;
    }

    .blog-copy {
      margin: 0;
      color: var(--purple-dark);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: clamp(0.79rem, 3.35vw, 0.94rem);
      line-height: 1.38;
      opacity: 0.94;
    }

    .blog-copy + .blog-copy {
      margin-top: 0.68rem;
    }

    .qa-panel {
      margin-top: 0.95rem;
      background: var(--panel);
      border-radius: 1rem;
      padding: 0.95rem 0.9rem 1rem;
      box-shadow: 0 4px 18px rgba(131, 22, 98, 0.07);
    }

    .qa-title {
      margin: 0 0 0.6rem;
      color: var(--purple-dark);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: clamp(1rem, 4.5vw, 1.2rem);
      line-height: 1.1;
    }

    .qa-form {
      display: grid;
      gap: 0.45rem;
      margin-bottom: 0.75rem;
    }

    .qa-input,
    .qa-textarea {
      width: 100%;
      border: 2px solid rgba(131, 22, 98, 0.22);
      border-radius: 0.55rem;
      padding: 0.45rem 0.52rem;
      background: #fffdfb;
      color: var(--purple-dark);
      font: inherit;
      letter-spacing: 0.02em;
      outline: none;
    }

    .qa-input:focus-visible,
    .qa-textarea:focus-visible {
      border-color: var(--accent-orange);
    }

    .qa-input::placeholder,
    .qa-textarea::placeholder {
      color: rgba(131, 22, 98, 0.62);
      text-transform: uppercase;
    }

    .qa-textarea {
      min-height: 4rem;
      resize: vertical;
    }

    .qa-submit {
      justify-self: center;
      border: none;
      border-radius: 999px;
      padding: 0.45rem 0.8rem;
      background: var(--accent-orange);
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font: inherit;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .qa-submit:active {
      transform: scale(0.97);
      opacity: 0.94;
    }

    .qa-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.55rem;
      max-height: 16rem;
      overflow-y: auto;
    }

    .qa-empty {
      margin: 0;
      color: rgba(131, 22, 98, 0.78);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.76rem;
      line-height: 1.3;
      text-align: center;
      padding: 0.4rem 0.2rem;
    }

    .qa-item {
      background: #fff7f2;
      border: 1px solid rgba(131, 22, 98, 0.15);
      border-radius: 0.65rem;
      padding: 0.55rem 0.55rem 0.6rem;
    }

    .qa-question-meta,
    .qa-answer-meta {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.66rem;
      color: rgba(131, 22, 98, 0.76);
    }

    .qa-question-text,
    .qa-answer-text {
      margin: 0.2rem 0 0;
      color: var(--purple-dark);
      letter-spacing: 0.02em;
      font-size: 0.8rem;
      line-height: 1.32;
      text-transform: uppercase;
    }

    .qa-answer-block {
      margin-top: 0.55rem;
      padding-top: 0.45rem;
      border-top: 1px solid rgba(131, 22, 98, 0.13);
    }

    .qa-answer-form {
      margin-top: 0.55rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.35rem;
    }

    .qa-answer-input {
      border: 1px solid rgba(131, 22, 98, 0.22);
      border-radius: 0.5rem;
      padding: 0.4rem 0.45rem;
      background: #fff;
      color: var(--purple-dark);
      font: inherit;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      outline: none;
    }

    .qa-answer-input:focus-visible {
      border-color: var(--accent-orange);
    }

    .qa-answer-button {
      border: none;
      border-radius: 999px;
      padding: 0.36rem 0.62rem;
      background: var(--orange-soft);
      color: var(--purple-dark);
      font: inherit;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
    }

    .communities-prev {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      margin: 1.45rem auto 0;
      width: fit-content;
      color: var(--accent-orange);
      text-decoration: none;
      font-size: clamp(1.1rem, 4.9vw, 1.38rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
    }

    .communities-prev:active {
      opacity: 0.92;
    }

    .communities-prev .arrow {
      font-size: 1.25em;
      line-height: 1;
    }
    footer {
      width: 100%;
      margin-top: auto;
      background: var(--purple-dark);
      padding: 1.55rem 1.35rem max(1.65rem, env(safe-area-inset-bottom));
      text-align: center;
    
      cursor: pointer;
    }
.footer-brand {
      margin: 0;
      font-size: clamp(2rem, 10vw, 3rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-orange);
    }

</style>
  <script>
    (() => {
      const navEntry =
        typeof performance !== "undefined" && performance.getEntriesByType
          ? performance.getEntriesByType("navigation")[0]
          : null;
      const isReload = navEntry
        ? navEntry.type === "reload"
        : typeof performance !== "undefined" && performance.navigation
          ? performance.navigation.type === 1
          : false;

      if (isReload) {
        window.location.replace("index.html");
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>My community!</h1>
    <div class="rule" aria-hidden="true"></div>

    <section class="blog-panel" aria-label="Neighborhood community article">
      <p class="blog-tag">Neighborhood Spotlight</p>
      <h2 class="blog-title" id="blog-title">Bearden</h2>
      <p class="blog-copy" id="blog-copy-1"></p>
      <p class="blog-copy" id="blog-copy-2"></p>
      <p class="blog-copy" id="blog-copy-3"></p>
    </section>

    <section class="qa-panel" aria-label="Neighborhood questions and answers">
      <h3 class="qa-title">Neighborhood Q&A</h3>
      <form id="qa-form" class="qa-form">
        <input
          id="qa-name-input"
          class="qa-input"
          type="text"
          maxlength="40"
          placeholder="Your name (optional)"
          aria-label="Your name"
        />
        <textarea
          id="qa-question-input"
          class="qa-textarea"
          maxlength="300"
          placeholder="Ask a question for this neighborhood community..."
          aria-label="Question"
          required
        ></textarea>
        <button type="submit" class="qa-submit">Post Question</button>
      </form>
      <ul id="qa-list" class="qa-list" aria-live="polite"></ul>
    </section>

    <a class="communities-prev" href="my-communities-neighborhood.html" aria-label="Go back to neighborhood my community page">
      <span class="arrow" aria-hidden="true">&lt;</span>
      <span>Neighborhood</span>
    </a>
  </main>

  <footer id="page-footer" role="button" tabindex="0" aria-label="Go back or go to home page">
    <p class="footer-brand">Bite Buddy</p>
  </footer>

  <script>
    const BLOGS = {
      "bearden": {
        title: "Bearden",
        p1: "Tree-lined streets, local cafes, and easy access to west knox shopping make bearden a go-to for relaxed weekday meals and weekend brunch meetups.",
        p2: "Menus here are usually flexible, and many spots will swap sides, skip sauces, or adjust prep when you mention an allergy up front.",
        p3: "Best vibe: easy neighborhood energy with polished casual dining and lots of familiar local favorites."
      },
      "north-shore": {
        title: "North Shore",
        p1: "North shore blends river views and walkable blocks with coffee shops, patios, and downtown-adjacent restaurants that stay lively throughout the day.",
        p2: "It is a great area for groups with mixed dietary needs because many kitchens offer clear ingredient guidance and customizable plates.",
        p3: "Best vibe: scenic and social, with quick city access and a strong mix of casual and elevated food options."
      },
      "north-knox": {
        title: "North Knox",
        p1: "North knox has a creative, local-first feel with newer concepts, neighborhood staples, and plenty of quick casual spots that stay allergy-aware.",
        p2: "You will usually find staff willing to talk through prep details, especially for cross-contact questions and sauce ingredients.",
        p3: "Best vibe: energetic and modern, with independent restaurants and frequent new openings."
      },
      "downtown": {
        title: "Downtown",
        p1: "Downtown knoxville is packed with walkable dining, from coffee counters to date-night restaurants, all close to market square and old city streets.",
        p2: "Because menus rotate often, it helps to ask about current ingredients, but many locations are used to handling gluten and dairy requests.",
        p3: "Best vibe: high-energy city dining with broad cuisine variety and easy pre-event dinner options."
      },
      "farragut": {
        title: "Farragut",
        p1: "Farragut offers family-friendly dining clusters with dependable menus, larger seating layouts, and convenient parking for low-stress planning.",
        p2: "Consistent chains and local spots make it easier to repeat safe orders and build a shortlist of trusted allergy-friendly restaurants.",
        p3: "Best vibe: comfortable and practical, with reliable service and predictable meal options."
      },
      "cedar-bluff": {
        title: "Cedar Bluff",
        p1: "Cedar bluff is a busy food corridor where fast-casual, sit-down, and takeout options are all close together for quick decision making.",
        p2: "It is ideal when you need backup plans, since multiple nearby kitchens can usually accommodate allergy notes without long detours.",
        p3: "Best vibe: convenient and versatile, great for weeknight dinners and flexible group plans."
      },
      "sequoyah-hills": {
        title: "Sequoyah Hills",
        p1: "Sequoyah hills brings a quieter pace with scenic drives and nearby restaurants that feel calm, classic, and neighborhood-centered.",
        p2: "Many spots focus on straightforward ingredients, which can simplify ordering when you need cleaner, less complicated dishes.",
        p3: "Best vibe: peaceful and polished, suited for slower meals and low-noise dining."
      },
      "fort-sanders": {
        title: "Fort Sanders",
        p1: "Fort sanders serves students, hospital staff, and locals with quick-service options and affordable menus near campus and medical centers.",
        p2: "Short wait times and straightforward builds can help when you need fast food choices with clear allergen communication.",
        p3: "Best vibe: fast-moving and practical, with lots of accessible, budget-friendly choices."
      },
      "west-knox": {
        title: "West Knox",
        p1: "West knox covers a broad mix of shopping districts and restaurant hubs, giving you strong cuisine variety across short driving distances.",
        p2: "With so many options, it is one of the easiest zones to compare allergy accommodations and switch plans if a place cannot safely modify.",
        p3: "Best vibe: broad and reliable, with something for nearly every craving and comfort level."
      }
    };

    const params = new URLSearchParams(window.location.search);
    const key = params.get("name") || "bearden";
    const blog = BLOGS[key] || BLOGS["bearden"];

    document.title = `My Community — ${blog.title}`;
    document.getElementById("blog-title").textContent = blog.title;
    document.getElementById("blog-copy-1").textContent = blog.p1;
    document.getElementById("blog-copy-2").textContent = blog.p2;
    document.getElementById("blog-copy-3").textContent = blog.p3;

    const QA_STORAGE_KEY = "neighborhoodQaBoardV1";
    const API_ROOT = "/api/neighborhood-qa";
    const qaForm = document.getElementById("qa-form");
    const qaNameInput = document.getElementById("qa-name-input");
    const qaQuestionInput = document.getElementById("qa-question-input");
    const qaList = document.getElementById("qa-list");
    let usingFallbackStorage = false;

    function loadQaStore() {
      try {
        const raw = localStorage.getItem(QA_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveQaStore(store) {
      try {
        localStorage.setItem(QA_STORAGE_KEY, JSON.stringify(store));
      } catch {
        /* ignore */
      }
    }

    function getCurrentNeighborhoodQuestions(store) {
      const arr = store[key];
      return Array.isArray(arr) ? arr : [];
    }

    async function fetchQuestions() {
      if (usingFallbackStorage) {
        return getCurrentNeighborhoodQuestions(loadQaStore());
      }
      try {
        const res = await fetch(`${API_ROOT}/${encodeURIComponent(key)}`, {
          headers: { Accept: "application/json" },
        });
        if (!res.ok) throw new Error("Failed to load questions");
        const data = await res.json();
        return Array.isArray(data.questions) ? data.questions : [];
      } catch {
        usingFallbackStorage = true;
        return getCurrentNeighborhoodQuestions(loadQaStore());
      }
    }

    async function postQuestion(asker, question) {
      if (usingFallbackStorage) {
        const store = loadQaStore();
        const rows = getCurrentNeighborhoodQuestions(store);
        rows.unshift({ id: crypto.randomUUID(), asker, question, answers: [] });
        store[key] = rows;
        saveQaStore(store);
        return;
      }
      try {
        const res = await fetch(`${API_ROOT}/${encodeURIComponent(key)}/questions`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ asker, question }),
        });
        if (!res.ok) throw new Error("Failed to post question");
      } catch {
        usingFallbackStorage = true;
        const store = loadQaStore();
        const rows = getCurrentNeighborhoodQuestions(store);
        rows.unshift({ id: crypto.randomUUID(), asker, question, answers: [] });
        store[key] = rows;
        saveQaStore(store);
      }
    }

    async function postAnswer(questionId, text) {
      if (usingFallbackStorage) {
        const store = loadQaStore();
        const rows = getCurrentNeighborhoodQuestions(store);
        const row = rows.find((r) => String(r.id) === String(questionId));
        if (!row) return;
        if (!Array.isArray(row.answers)) row.answers = [];
        row.answers.push({ id: crypto.randomUUID(), by: "Community Member", text });
        store[key] = rows;
        saveQaStore(store);
        return;
      }
      try {
        const res = await fetch(
          `${API_ROOT}/${encodeURIComponent(key)}/questions/${encodeURIComponent(questionId)}/answers`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ by: "Community Member", text }),
          }
        );
        if (!res.ok) throw new Error("Failed to post answer");
      } catch {
        usingFallbackStorage = true;
        const store = loadQaStore();
        const rows = getCurrentNeighborhoodQuestions(store);
        const row = rows.find((r) => String(r.id) === String(questionId));
        if (!row) return;
        if (!Array.isArray(row.answers)) row.answers = [];
        row.answers.push({ id: crypto.randomUUID(), by: "Community Member", text });
        store[key] = rows;
        saveQaStore(store);
      }
    }

    async function renderQaList() {
      const rows = await fetchQuestions();
      if (rows.length === 0) {
        qaList.innerHTML = '<li><p class="qa-empty">Be the first to ask a question in this neighborhood.</p></li>';
        return;
      }

      qaList.innerHTML = rows
        .map((entry) => {
          const qid = String(entry.id || "");
          const asker = String(entry.asker || "Community Member").toUpperCase();
          const question = String(entry.question || "").toUpperCase();
          const answers = Array.isArray(entry.answers) ? entry.answers : [];
          const answersHtml = answers.length
            ? answers
                .map((a) => {
                  const responder = String(a.by || "Community").toUpperCase();
                  const text = String(a.text || "").toUpperCase();
                  return `<div class="qa-answer-block">
                    <p class="qa-answer-meta">${responder}</p>
                    <p class="qa-answer-text">${text}</p>
                  </div>`;
                })
                .join("")
            : "";

          return `<li class="qa-item">
            <p class="qa-question-meta">${asker}</p>
            <p class="qa-question-text">${question}</p>
            ${answersHtml}
            <form class="qa-answer-form" data-qid="${qid}">
              <input class="qa-answer-input" type="text" maxlength="220" placeholder="Write an answer..." aria-label="Answer question" required />
              <button class="qa-answer-button" type="submit">Answer</button>
            </form>
          </li>`;
        })
        .join("");
    }

    qaForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = qaQuestionInput.value.trim();
      if (!question) return;
      const asker = qaNameInput.value.trim() || "Community Member";

      await postQuestion(asker, question);
      qaQuestionInput.value = "";
      await renderQaList();
    });

    qaList.addEventListener("submit", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLFormElement) || !target.matches(".qa-answer-form")) return;
      event.preventDefault();

      const questionId = target.getAttribute("data-qid");
      if (!questionId) return;

      const answerInput = target.querySelector(".qa-answer-input");
      if (!(answerInput instanceof HTMLInputElement)) return;
      const text = answerInput.value.trim();
      if (!text) return;
      await postAnswer(questionId, text);
      await renderQaList();
    });

    renderQaList();
  </script>

  <script>
    function goBackOrHome() {
      window.location.href = "home.html";
    }

    const pageFooter = document.getElementById("page-footer");
    if (pageFooter) {
      pageFooter.addEventListener("click", goBackOrHome);
      pageFooter.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          goBackOrHome();
        }
      });
    }
  </script>
</body>
</html>
